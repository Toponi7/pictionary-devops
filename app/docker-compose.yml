# =============================================================
#  RÉSEAUX
# =============================================================
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

# =============================================================
#  VOLUMES
# =============================================================

volumes:
  db_data:

# =============================================================
#  SERVICES
# =============================================================
services:
  # -----------------------------------------------------------
  # FRONT-END — Apache (HTML/CSS/JS statique)
  # -----------------------------------------------------------
  frontend:
    image: httpd:2.4-alpine
    container_name: frontend
    expose:
      - "80"
    volumes:
      - ./app/frontend:/usr/local/apache2/htdocs:ro
      - ./config/apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
    networks:
      - frontend_net
    restart: unless-stopped

  # -----------------------------------------------------------
  # BACK-END — PHP (php-fpm + Apache ou php:apache)
  # -----------------------------------------------------------
  backend:
    image: php:8.3-apache
    container_name: backend
    expose:
      - "80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./app/backend:/var/www/html
      - ./config/php/php.ini:/usr/local/etc/php/php.ini:ro
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # -----------------------------------------------------------
  # BASE DE DONNÉES — MySQL
  # -----------------------------------------------------------
  db:
    image: mysql:8.4
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend_net
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
