---
- name: Configuration du nœud K3s, déploiement applicatif et observabilité
  hosts: staging_nodes
  become: yes
  gather_facts: yes

  tasks:
    # =========================================================================
    # ÉTAPE 1 : PRÉREQUIS ET INSTALLATION DE K3S
    # =========================================================================
    - name: Mise à jour des paquets du système
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist

    - name: Installation des outils de base
      ansible.builtin.apt:
        name:
          - curl
          - apt-transport-https
          - ca-certificates
        state: present

    - name: Téléchargement et exécution du script d'installation K3s
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Attendre que l'API Kubernetes soit disponible (Port 6443)
      ansible.builtin.wait_for:
        port: 6443
        delay: 5
        timeout: 60

    - name: Vérification du statut du nœud K3s
      ansible.builtin.command: k3s kubectl get nodes
      register: k3s_status
      changed_when: false

    # =========================================================================
    # ÉTAPE 2 : DÉPLOIEMENT DE L'APPLICATION MÉTIER
    # =========================================================================
    - name: Création du dossier pour les manifestes sur la VM
      ansible.builtin.file:
        path: /opt/kubernetes
        state: directory
        mode: '0755'

    - name: Copie du manifeste Kubernetes depuis le runner vers la VM
      ansible.builtin.copy:
        src: ../kubernetes/pictionary-app.yaml
        dest: /opt/kubernetes/pictionary-app.yaml
        mode: '0644'

    - name: Mise à jour du tag de l'image dans le manifeste
      ansible.builtin.replace:
        path: /opt/kubernetes/pictionary-app.yaml
        regexp: 'ghcr\.io/toponi7/pictionary-devops:[^\s]+'
        replace: 'ghcr.io/toponi7/pictionary-devops:{{ image_tag }}'

    - name: Créer le secret pour accéder à GHCR
      ansible.builtin.shell: >
        k3s kubectl create secret docker-registry ghcr-secret
        --docker-server=ghcr.io
        --docker-username={{ ghcr_username }}
        --docker-password={{ ghcr_password }}
        --dry-run=client -o yaml | k3s kubectl apply -f -
      changed_when: false

    - name: Application du manifeste applicatif
      ansible.builtin.command: k3s kubectl apply -f /opt/kubernetes/pictionary-app.yaml
      register: kubectl_apply
      changed_when: "'created' in kubectl_apply.stdout or 'configured' in kubectl_apply.stdout"

    - name: Debug - Attendre 30s que les pods tentent de démarrer
      ansible.builtin.pause:
        seconds: 30

    - name: Debug - Statut des pods
      ansible.builtin.command: k3s kubectl get pods -o wide
      register: pods_status
      changed_when: false

    - name: Debug - Afficher les pods
      ansible.builtin.debug:
        var: pods_status.stdout

    - name: Debug - Describe du pod web
      ansible.builtin.shell: >
        k3s kubectl describe pod -l app=web
      register: pod_describe
      changed_when: false

    - name: Debug - Afficher le describe
      ansible.builtin.debug:
        var: pod_describe.stdout

    #- name: Vérification que le rolling update est terminé
     # ansible.builtin.command: >
      #  k3s kubectl rollout status deployment/web --timeout=180s
      #register: rollout_status
      #changed_when: false
      #failed_when: rollout_status.rc != 0

    # =========================================================================
    # ÉTAPE 3 : INSTALLATION DE HELM
    # =========================================================================
    - name: Télécharger le script d'installation de Helm
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get_helm.sh
        mode: '0700'

    - name: Installer Helm
      ansible.builtin.command: /tmp/get_helm.sh
      args:
        creates: /usr/local/bin/helm

    # =========================================================================
    # ÉTAPE 4 : OBSERVABILITÉ (Prometheus & Grafana via Helm avec NodePort)
    # =========================================================================
    - name: Ajouter le repository Helm de la communauté Prometheus
      ansible.builtin.command: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false

    - name: Mettre à jour les repositories Helm
      ansible.builtin.command: helm repo update
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false

    - name: Déployer la stack kube-prometheus-stack (Exposé en NodePort)
      ansible.builtin.command: >
        helm upgrade --install monitoring prometheus-community/kube-prometheus-stack
        --namespace monitoring --create-namespace
        --set grafana.adminPassword=admin
        --set grafana.service.type=NodePort
        --set grafana.service.nodePort=30080
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: helm_install
      changed_when: "'Release \"monitoring\" does not exist. Installing it now.' in helm_install.stdout or 'has been upgraded' in helm_install.stdout"

    # =========================================================================
    # ÉTAPE 5 : LOKI (Collecte de logs)
    # =========================================================================
    - name: Ajouter le repository Helm de Grafana (Loki)
      ansible.builtin.command: helm repo add grafana https://grafana.github.io/helm-charts
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false

    - name: Mettre à jour les repositories Helm après ajout de Grafana
      ansible.builtin.command: helm repo update
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false

    - name: Déployer Loki en mode single-binary (adapté à un cluster single-node)
      ansible.builtin.command: >
        helm upgrade --install loki grafana/loki
        --namespace monitoring --create-namespace
        --set loki.auth_enabled=false
        --set loki.commonConfig.replication_factor=1
        --set loki.storage.type=filesystem
        --set singleBinary.replicas=1
        --set read.replicas=0
        --set write.replicas=0
        --set backend.replicas=0
        --set loki.useTestSchema=true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: loki_install
      changed_when: "'Release \"loki\" does not exist. Installing it now.' in loki_install.stdout or 'has been upgraded' in loki_install.stdout"

    - name: Déployer Promtail (agent de collecte des logs vers Loki)
      ansible.builtin.command: >
        helm upgrade --install promtail grafana/promtail
        --namespace monitoring
        --set config.clients[0].url=http://loki:3100/loki/api/v1/push
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: promtail_install
      changed_when: "'Release \"promtail\" does not exist. Installing it now.' in promtail_install.stdout or 'has been upgraded' in promtail_install.stdout"

    - name: Attendre que Loki soit prêt
      ansible.builtin.command: >
        k3s kubectl rollout status deployment/loki
        -n monitoring --timeout=120s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: loki_status
      changed_when: false
      failed_when: false

    - name: Déployer le ConfigMap de la datasource Loki
      ansible.builtin.shell: |
        k3s kubectl apply -f - <<EOF
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: loki-datasource
          namespace: monitoring
          labels:
            grafana_datasource: "1"
        data:
          loki-datasource.yaml: |
            apiVersion: 1
            datasources:
              - name: Loki
                type: loki
                access: proxy
                url: http://loki.monitoring.svc.cluster.local:3100
                isDefault: false
                version: 1
                editable: true
        EOF
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: datasource_apply
      changed_when: "'created' in datasource_apply.stdout or 'configured' in datasource_apply.stdout"

    # =========================================================================
    # ÉTAPE 6 : PERSISTANCE DES DASHBOARDS GRAFANA
    # =========================================================================
    - name: Créer le dossier temporaire pour le dashboard sur la VM
      ansible.builtin.file:
        path: /opt/monitoring/dashboards
        state: directory
        mode: '0755'

    - name: Copier le fichier JSON du dashboard vers la VM
      ansible.builtin.copy:
        src: files/pictionary-dashboard.json
        dest: /opt/monitoring/dashboards/pictionary-dashboard.json
        mode: '0644'

    - name: Injecter le dashboard dans Kubernetes via une ConfigMap
      ansible.builtin.shell: >
        k3s kubectl create configmap pictionary-dashboard
        --namespace monitoring
        --from-file=/opt/monitoring/dashboards/pictionary-dashboard.json
        --dry-run=client -o yaml | k3s kubectl apply -f -
      changed_when: false

    - name: Labeliser la ConfigMap pour que Grafana la détecte
      ansible.builtin.command: >
        k3s kubectl label configmap pictionary-dashboard
        --namespace monitoring
        grafana_dashboard="1" --overwrite
      changed_when: false

    - name: Affichage d'un résumé de fin d'exécution
      ansible.builtin.debug:
        msg: >
          Déploiement terminé avec succès !
          - Grafana     → port 30080 (admin/admin)
          - Prometheus  → intégré dans la stack monitoring
          - Loki        → http://loki.monitoring.svc.cluster.local:3100
          - Promtail    → collecte les logs de tous les pods automatiquement
          - Dashboards  → pictionary-dashboard injecté et détecté par Grafana
