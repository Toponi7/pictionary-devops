name: Deploy Infrastructure

# Se déclenche lors d'un push sur la branche main dans le dossier terraform
on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'

jobs:
  terraform:
    name: 'Terraform Plan & Apply'
    runs-on: ubuntu-latest
    
    # On injecte les secrets GitHub dans l'environnement du conteneur
    env:
      OS_USERNAME: ${{ secrets.OS_USERNAME }}
      OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
      OS_DOMAIN_NAME: "Default"

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Installation de Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        # Seul un push direct sur la branche principale applique l'infrastructure
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
