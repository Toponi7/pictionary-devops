name: Deploy Infrastructure

on:
  push:
    branches:
      - main
      - preprod
    paths:
      - 'terraform/**'
      - 'ansible/**'
      
  # 👇 AJOUT : Configuration du bouton manuel avec l'option Apply ou Destroy 👇
  workflow_dispatch:
    inputs:
      action:
        description: 'Action Terraform (apply ou destroy)'
        required: true
        default: 'apply'
        type: choice
        options:
        - apply
        - destroy
  
  # 👇 Écoute le workflow Docker 👇
  workflow_run:
    workflows: ["Build and Push Docker Image to GHCR"] # Doit correspondre EXACTEMENT au "name:" du docker-build.yml
    types:
      - completed
    branches:
      - preprod # Se déclenche uniquement si le build venait de la branche preprod

jobs:
  terraform-and-ansible:
    name: 'Terraform Provisioning & Ansible Configuration'
    runs-on: ubuntu-latest
    
    # 👇 SÉCURITÉ : On ne déploie que si le workflow précédent a RÉUSSI 👇
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    
    env:
      OS_USERNAME: ${{ secrets.OS_USERNAME }}
      OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
      OS_DOMAIN_NAME: "Default"
      # Détermination conditionnelle de la branche cible selon le type d'événement
      TARGET_ENV: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
      
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          # Spécification explicite de la branche à récupérer
          ref: ${{ env.TARGET_ENV }}

      - name: Installation de Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      # 👇 MODIFICATION : Condition pour exécuter apply ou destroy 👇
      - name: Terraform Init, Workspace & Apply/Destroy
        run: |
          cd terraform
          terraform init
          
          # Sélectionne le workspace correspondant à la branche active ciblée, ou le crée s'il n'existe pas
          terraform workspace select ${{ env.TARGET_ENV }} || terraform workspace new ${{ env.TARGET_ENV }}
          
          # Exécute apply ou destroy selon le choix de l'utilisateur (apply par défaut)
          if [ "${{ github.event.inputs.action }}" = "destroy" ]; then
            echo "⚠️ Lancement de TERRAFORM DESTROY ⚠️"
            terraform destroy -auto-approve
          else
            echo "✅ Lancement de TERRAFORM APPLY ✅"
            terraform apply -auto-approve
          fi

      # --- ÉTAPE PASSERELLE : RÉCUPÉRATION DE L'IP ---
      # (Ignorée si on vient de détruire l'infrastructure)
      - name: Extraction de l'IP du serveur
        if: ${{ github.event.inputs.action != 'destroy' }}
        id: get-ip
        run: |
          cd terraform
          VM_IP=$(terraform output -raw instance_ip)
          echo "TARGET_IP=$VM_IP" >> $GITHUB_ENV

      # --- ÉTAPE ANSIBLE ---
      # (Toutes ces étapes sont ignorées en cas de destroy)
      - name: Installation d'Ansible sur le runner GitHub
        if: ${{ github.event.inputs.action != 'destroy' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Configuration de la clé SSH privée et attente du serveur
        if: ${{ github.event.inputs.action != 'destroy' }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          echo "⌛ Attente de l'ouverture du port SSH sur ${{ env.TARGET_IP }} (Timeout 5 minutes)..."
          timeout 300 bash -c '
            until nc -z -w3 ${{ env.TARGET_IP }} 22; do
              sleep 5
            done
          '
          
          # Une fois le port ouvert, on récupère la clé d'hôte
          ssh-keyscan -H ${{ env.TARGET_IP }} >> ~/.ssh/known_hosts

      - name: Exécution du Playbook Ansible
        if: ${{ github.event.inputs.action != 'destroy' }}
        run: |
          ansible-playbook -i "${{ env.TARGET_IP }}," \
            -u debian \
            --private-key ~/.ssh/id_rsa \
            -e "ghcr_username=${{ github.actor }} ghcr_password=${{ secrets.GHCR_PAT }}" \
            ansible/playbook.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
