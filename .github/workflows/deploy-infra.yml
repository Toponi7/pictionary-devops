name: Deploy Infrastructure

on:
  push:
    branches:
      - main
      - preprod
    paths:
      - 'terraform/**'
      - 'ansible/**'

  workflow_dispatch:

  workflow_run:
    workflows: ["Build and Push Docker Image to GHCR"]
    types:
      - completed
    branches:
      - preprod

jobs:
  terraform-and-ansible:
    name: 'Terraform Provisioning & Ansible Configuration'
    runs-on: ubuntu-latest

    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    env:
      OS_USERNAME: ${{ secrets.OS_USERNAME }}
      OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
      OS_DOMAIN_NAME: "Default"
      TARGET_ENV: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_ENV }}

      - name: Installation de Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: Terraform Init, Workspace & Apply
        run: |
          cd terraform
          terraform init
          terraform workspace select ${{ env.TARGET_ENV }} || terraform workspace new ${{ env.TARGET_ENV }}
          terraform apply -auto-approve

      - name: Extraction de l'IP du serveur
        id: get-ip
        run: |
          cd terraform
          VM_IP=$(terraform output -raw instance_ip)
          echo "TARGET_IP=$VM_IP" >> $GITHUB_ENV

      - name: Installation d'Ansible sur le runner GitHub
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Configuration de la clé SSH privée et attente du serveur
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          echo "⌛ Attente de l'ouverture du port SSH sur ${{ env.TARGET_IP }}..."
          timeout 300 bash -c '
            until nc -z -w3 ${{ env.TARGET_IP }} 22; do
              sleep 5
            done
          '
          ssh-keyscan -H ${{ env.TARGET_IP }} >> ~/.ssh/known_hosts

      - name: Exécution du Playbook Ansible
        run: |
          echo "📝 Création de l'inventaire dynamique..."
          cat <<EOF > ansible/inventory.ini
          [staging_nodes]
          ${{ env.TARGET_IP }} ansible_user=debian ansible_ssh_private_key_file=~/.ssh/id_rsa
          EOF

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Déclenché après un build applicatif -> On utilise le SHA de l'image fraîchement construite
            IMAGE_TAG="sha-$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)"
          else
            # Déclenché par un push sur terraform/ansible -> On utilise la dernière image stable de la branche
            if [ "${{ env.TARGET_ENV }}" = "main" ]; then
              IMAGE_TAG="latest"
            else
              IMAGE_TAG="preprod-latest"
            fi
          fi

          echo "🚀 Lancement d'Ansible avec le tag image : $IMAGE_TAG"
          ansible-playbook -i ansible/inventory.ini \
            -e "ghcr_username=${{ github.actor }} ghcr_password=${{ secrets.GITHUB_TOKEN }}" \
            -e "image_tag=$IMAGE_TAG" \
            ansible/playbook.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"


# =========================================================================
      # PHASE DE VALIDATION AUTOMATISÉE (TESTS DE PREPROD)
      # =========================================================================

      - name: Validation 1 - Statut et Redémarrages des Pods K3s
        run: |
          ssh -o StrictHostKeyChecking=no debian@${{ env.TARGET_IP }} << 'EOF'
            echo "=== Attente de l'état Ready du déploiement web ==="
            sudo k3s kubectl rollout status deployment/web --timeout=180s
            
            echo "=== Vérification des compteurs de redémarrage ==="
            RESTARTS=$(sudo k3s kubectl get pods -l app=web -o jsonpath='{.items[*].status.containerStatuses[*].restartCount}')
            echo "Données de redémarrage des conteneurs : $RESTARTS"
            
            for count in $RESTARTS; do
              if [ "$count" -ne 0 ]; then
                echo "🚨 Erreur de stabilité : Un conteneur a redémarré ($count fois)."
                exit 1
              fi
            done
            echo "✅ Tous les conteneurs sont stables (RESTARTS: 0)."
          EOF

      - name: Validation 2 - Smoke Test (HTTP 200)
        run: |
          echo "=== Lancement du Smoke Test HTTP ==="
          URL="http://${{ env.TARGET_IP }}"
          TIMEOUT=60
          ELAPSED=0
          
          until [ $ELAPSED -ge $TIMEOUT ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "Requête vers $URL -> Code HTTP reçu : $HTTP_CODE"
            
            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "✅ Smoke Test réussi : L'application répond avec un code HTTP 200."
              exit 0
            fi
            
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          
          echo "🚨 Échec du Smoke Test : Impossible d'obtenir un code HTTP 200 en $TIMEOUT secondes."
          exit 1
      

      - name: Validation 3 - Analyse des logs applicatifs
        run: |
          ssh -o StrictHostKeyChecking=no debian@${{ env.TARGET_IP }} << 'EOF'
            echo "=== Analyse des 200 dernières lignes de logs du serveur Web ==="
            LOGS=$(sudo k3s kubectl logs -l app=web --tail=200)
            
            # Recherche de patterns d'erreurs critiques (insensible à la casse)
            if echo "$LOGS" | grep -Ei 'exception|fatal error|sql error|stack trace|connection refused'; then
              echo "🚨 Erreur : Des anomalies critiques ont été détectées dans les logs de l'application."
              exit 1
            fi
            echo "✅ Analyse des logs conforme : Aucun motif d'erreur critique détecté."
          EOF

      - name: Déclenchement du workflow de promotion en production
        if: success() && env.TARGET_ENV == 'preprod'
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/promote-to-production.yml/dispatches \
            -d '{"ref":"main"}'
  

