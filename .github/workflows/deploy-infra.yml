name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'ansible/**' # <-- Ajouté pour déclencher aussi si vous modifiez Ansible
  workflow_dispatch: # <-- Le fameux bouton manuel !

jobs:
  terraform-and-ansible:
    name: 'Terraform Provisioning & Ansible Configuration'
    runs-on: ubuntu-latest
    
    # 1. On injecte TOUS les secrets OVH au niveau du job pour que Terraform puisse s'authentifier
    env:
      OS_USERNAME: ${{ secrets.OS_USERNAME }}
      OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
      OS_DOMAIN_NAME: "Default"

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: Terraform Init & Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve

      # --- ÉTAPE PASSERELLE : RÉCUPÉRATION DE L'IP ---
      - name: Extraction de l'IP du serveur
        id: get-ip
        run: |
          cd terraform
          VM_IP=$(terraform output -raw instance_ip)
          echo "TARGET_IP=$VM_IP" >> $GITHUB_ENV

      # --- ÉTAPE ANSIBLE ---
      - name: Installation d'Ansible sur le runner GitHub
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Configuration de la clé SSH privée
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.TARGET_IP }} >> ~/.ssh/known_hosts

      - name: Exécution du Playbook Ansible
        run: |
          ansible-playbook -i "${{ env.TARGET_IP }}," \
            -u debian \
            --private-key ~/.ssh/id_rsa \
            ansible/playbook.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
