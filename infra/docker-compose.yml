# infra/docker-compose.yml
version: '3.8'

services:
  web:
    build: 
      context: ../app
    container_name: pictionary_web
    ports:
      - "80:80"
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: pictionary_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pictionary
      MYSQL_USER: pictionary_user
      MYSQL_PASSWORD: secretpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Le script SQL sera exécuté automatiquement au premier lancement
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  db_data:
