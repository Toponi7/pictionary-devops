# =============================================================
#  RÉSEAUX
# =============================================================
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
  monitoring_net:
    driver: bridge
  infra_net:
    driver: bridge

# =============================================================
#  VOLUMES
# =============================================================
volumes:
  db_data:
  prometheus_data:
  grafana_data:

# =============================================================
#  SERVICES
# =============================================================
services:

  # -----------------------------------------------------------
  # SUPERVISION — Prometheus
  # -----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - monitoring_net
      - frontend_net
      - backend_net
    restart: unless-stopped

  # -----------------------------------------------------------
  # SUPERVISION — Grafana
  # -----------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring_net
    depends_on:
      - prometheus
    restart: unless-stopped

  # -----------------------------------------------------------
  # NODE EXPORTER — métriques système pour Prometheus
  # -----------------------------------------------------------
  node_exporter:
    image: prom/node-exporter:v1.8.0
    container_name: node_exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - monitoring_net
    restart: unless-stopped

  # -----------------------------------------------------------
  # ANSIBLE — conteneur dédié à l'automatisation
  # -----------------------------------------------------------
  ansible:
    image: cytopia/ansible:latest-tools
    container_name: ansible
    working_dir: /ansible
    volumes:
      - ./ansible:/ansible
      - ./config/ssh:/root/.ssh:ro   # clés SSH pour accéder aux hôtes
    networks:
      - infra_net
    # Le conteneur reste en vie pour permettre les exec manuels
    entrypoint: ["tail", "-f", "/dev/null"]
    restart: unless-stopped

  # -----------------------------------------------------------
  # TERRAFORM — conteneur dédié à l'IaC
  # -----------------------------------------------------------
  terraform:
    image: hashicorp/terraform:1.8
    container_name: terraform
    working_dir: /terraform
    volumes:
      - ./terraform:/terraform
    networks:
      - infra_net
    # Le conteneur reste en vie pour permettre les exec manuels
    entrypoint: ["tail", "-f", "/dev/null"]
    restart: unless-stopped
