version: "3.9"

# =============================================================
#  RÉSEAUX
# =============================================================
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
  monitoring_net:
    driver: bridge
  infra_net:
    driver: bridge

# =============================================================
#  VOLUMES
# =============================================================
volumes:
  db_data:
  prometheus_data:
  grafana_data:

# =============================================================
#  SERVICES
# =============================================================
services:

  # -----------------------------------------------------------
  # LOAD BALANCER — HAProxy
  # -----------------------------------------------------------
  loadbalancer:
    image: haproxy:2.9-alpine
    container_name: loadbalancer
    ports:
      - "80:80"       # HTTP public
      - "443:443"     # HTTPS public
      - "8404:8404"   # Stats HAProxy
    volumes:
      - ./config/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - frontend_net
      - backend_net
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # -----------------------------------------------------------
  # FRONT-END — Apache (HTML/CSS/JS statique)
  # -----------------------------------------------------------
  frontend:
    image: httpd:2.4-alpine
    container_name: frontend
    expose:
      - "80"
    volumes:
      - ./app/frontend:/usr/local/apache2/htdocs:ro
      - ./config/apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
    networks:
      - frontend_net
    restart: unless-stopped

  # -----------------------------------------------------------
  # BACK-END — PHP (php-fpm + Apache ou php:apache)
  # -----------------------------------------------------------
  backend:
    image: php:8.3-apache
    container_name: backend
    expose:
      - "80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./app/backend:/var/www/html
      - ./config/php/php.ini:/usr/local/etc/php/php.ini:ro
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # -----------------------------------------------------------
  # BASE DE DONNÉES — MySQL
  # -----------------------------------------------------------
  db:
    image: mysql:8.4
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend_net
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # -----------------------------------------------------------
  # SUPERVISION — Prometheus
  # -----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - monitoring_net
      - frontend_net
      - backend_net
    restart: unless-stopped

  # -----------------------------------------------------------
  # SUPERVISION — Grafana
  # -----------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring_net
    depends_on:
      - prometheus
    restart: unless-stopped

  # -----------------------------------------------------------
  # NODE EXPORTER — métriques système pour Prometheus
  # -----------------------------------------------------------
  node_exporter:
    image: prom/node-exporter:v1.8.0
    container_name: node_exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - monitoring_net
    restart: unless-stopped

  # -----------------------------------------------------------
  # ANSIBLE — conteneur dédié à l'automatisation
  # -----------------------------------------------------------
  ansible:
    image: cytopia/ansible:latest-tools
    container_name: ansible
    working_dir: /ansible
    volumes:
      - ./ansible:/ansible
      - ./config/ssh:/root/.ssh:ro   # clés SSH pour accéder aux hôtes
    networks:
      - infra_net
    # Le conteneur reste en vie pour permettre les exec manuels
    entrypoint: ["tail", "-f", "/dev/null"]
    restart: unless-stopped

  # -----------------------------------------------------------
  # TERRAFORM — conteneur dédié à l'IaC
  # -----------------------------------------------------------
  terraform:
    image: hashicorp/terraform:1.8
    container_name: terraform
    working_dir: /terraform
    volumes:
      - ./terraform:/terraform
    networks:
      - infra_net
    # Le conteneur reste en vie pour permettre les exec manuels
    entrypoint: ["tail", "-f", "/dev/null"]
    restart: unless-stopped
