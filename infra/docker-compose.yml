version: '3.8'

services:
  web:
    build: .
    container_name: pictionary_web
    ports:
      - "80:80"
    volumes:
      - ./public:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=pictionary_user
      - DB_PASSWORD=P@ssw0rd
      - DB_NAME=pictionary

  db:
    image: mysql:8.0
    container_name: pictionary_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: pictionary
      MYSQL_USER: pictionary_user
      MYSQL_PASSWORD: secret_password
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
