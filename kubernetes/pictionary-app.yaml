---
# 1. Configuration : Le script SQL d'initialisation
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init-script
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS pictionary;
    USE pictionary;
    CREATE TABLE IF NOT EXISTS mots (id INT AUTO_INCREMENT PRIMARY KEY, mot VARCHAR(255) NOT NULL);
    INSERT INTO mots (mot) VALUES ('Chien'), ('Maison'), ('Voiture'), ('Tour Eiffel'), ('Ordinateur');
---
# 2. Base de données : Déploiement et Service réseau
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
      - name: mariadb
        image: mariadb:10.11
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "root_password_secret"
        - name: MYSQL_DATABASE
          value: "pictionary"
        - name: MYSQL_USER
          value: "utilisateur"
        - name: MYSQL_PASSWORD
          value: "motdepasse"
        volumeMounts:
        - name: init-script-volume
          mountPath: /docker-entrypoint-initdb.d/init.sql
          subPath: init.sql
      volumes:
      - name: init-script-volume
        configMap:
          name: db-init-script
---
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  selector:
    app: mariadb
  ports:
    - port: 3306
---
# 3. Serveur Web (PHP) : Déploiement et Service exposé
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: web
    spec:
      initContainers:           
      - name: wait-for-db
        image: busybox
        command: ['sh', '-c', 'until nc -z db 3306; do echo "Attente MariaDB..."; sleep 2; done']
      containers:
      - name: web
        image: ghcr.io/toponi7/pictionary-devops:latest
        imagePullPolicy: Always
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        env:
        - name: DB_HOST
          value: "db"
        - name: DB_NAME
          value: "pictionary"
        - name: DB_USER
          value: "utilisateur"
        - name: DB_PASS
          value: "motdepasse"
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-ingress
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-service
            port:
              number: 80
